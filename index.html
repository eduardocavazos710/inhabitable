<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>INHABITABLE</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  overflow: hidden;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

#intro img {
  width: 60%;
  animation: fadeInOut 5s forwards;
}

@keyframes fadeInOut {
  0% {opacity:0;}
  10% {opacity:1;}
  50% {opacity:1;}
  100% {opacity:0;}
}

/* MAIN */
#main {
  display: none;
  height: 100vh;
  background: black;
  transition: background 3s ease;
}

.container {
  display: flex;
  height: 100%;
  align-items: center;
  justify-content: space-between;
  padding: 40px;
}

/* LEFT */
.left {
  width: 45%;
}

.left img {
  width: 70%;
  opacity: 0;
  animation: fadeLeft 3s forwards;
}

@keyframes fadeLeft {
  from {opacity:0; transform:translateX(-40px);}
  to {opacity:1; transform:translateX(0);}
}

/* TEXT */
#typeText {
  margin-top: 30px;
  font-size: 18px;
  min-height: 120px;
  line-height: 1.5;
}

/* RIGHT */
.right {
  width: 45%;
  text-align: center;
}

.right img {
  width: 60%; /* 🔥 MÁS PEQUEÑO */
  max-height: 70vh;
}

/* BUTTONS */
.buttons {
  margin-top: 20px;
}

button {
  padding: 10px 20px;
  margin: 8px;
  background: white;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="intro">
  <img src="titulo.png">
</div>

<div id="main">
  <div class="container">

    <div class="left">
      <img src="titulo.png">
      <div id="typeText"></div>
    </div>

    <div class="right">
      <img src="libro.png">
      <div class="buttons">
        <button id="btn1" onclick="toggleInfo()">Sobre el libro</button>
        <button onclick="comprar()">Comprar</button>
      </div>
    </div>

  </div>
</div>

<script>

let estado = "inicio";

// INTRO → MAIN
setTimeout(() => {
  document.getElementById("intro").style.display = "none";
  document.getElementById("main").style.display = "block";

  setTimeout(() => {
    document.getElementById("main").style.backgroundImage = "url('fondo.jpg')";
  }, 500);

  iniciarFrases();
}, 5000);


// FRASES
const frases = [
"Todo lo que ocultamos… encuentra la forma de salir.",
"¿Está usted preparado para el fin?",
"La pesadilla no terminó... Se filtró en la realidad.",
"¿Has visto algo que no debería estar ahí?",
"¿Escuchaste eso?... Mejor no voltees.",
"Si miras hacia arriba… algo podría caer.",
"Había más ruido en mi cabeza."
];

let index = 0;
let texto = "";
let escribiendo = true;

function iniciarFrases(){
  loopFrases();
}

function loopFrases(){
  let target = document.getElementById("typeText");

  if(estado !== "inicio") return;

  if(escribiendo){
    texto += frases[index].charAt(texto.length);
    target.innerHTML = texto;

    if(texto.length === frases[index].length){
      escribiendo = false;
      setTimeout(loopFrases, 1200);
      return;
    }

  } else {
    texto = texto.slice(0,-1);
    target.innerHTML = texto;

    if(texto.length === 0){
      escribiendo = true;
      index = (index + 1) % frases.length;
    }
  }

  setTimeout(loopFrases, 40);
}


// TOGGLE SINOPSIS
function toggleInfo(){

  let btn = document.getElementById("btn1");

  if(estado === "inicio"){
    estado = "sinopsis";
    btn.innerText = "Regresar";

    borrarTexto(() => {
      escribirBloque([
"El mundo.",
"El universo.",
"Nosotros.",
"",
"La hostilidad es natural.",
"",
"INHABITABLE es un libro donde la realidad se quiebra...",
"y la mente deja de ser un lugar seguro.",
"",
"Siete cuentos.",
"Desde lo mundano hasta lo cósmico.",
"",
"El horror puede surgir de cualquier lugar.",
"Incluso desde nosotros mismos.",
"",
"El miedo es el precio de la conciencia."
      ]);
    });

  } else {
    estado = "inicio";
    btn.innerText = "Sobre el libro";

    borrarTexto(() => {
      texto = "";
      iniciarFrases();
    });
  }
}


// BORRAR TEXTO
function borrarTexto(callback){
  let target = document.getElementById("typeText");

  function borrar(){
    let txt = target.innerHTML.replace(/<br>/g,"");

    if(txt.length > 0){
      target.innerHTML = txt.slice(0,-1);
      setTimeout(borrar, 20);
    } else {
      callback();
    }
  }

  borrar();
}


// ESCRIBIR BLOQUE
function escribirBloque(lineas){
  let target = document.getElementById("typeText");
  target.innerHTML = "";

  let i = 0;

  function escribir(){
    if(i < lineas.length){
      target.innerHTML += lineas[i] + "<br>";
      i++;
      setTimeout(escribir, 120);
    }
  }

  escribir();
}


// COMPRAR
function comprar(){
  estado = "compra";

  borrarTexto(() => {
    escribirBloque([
"Precio: $250 MXN",
"Páginas: 120",
"Autor: Eduardo Cavazos García",
"",
"Disponible próximamente."
    ]);
  });
}

</script>

</body>
</html>
