<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Inhabitable</title>

  <style>
    body {
      background: #0a0a0a;
      color: #eaeaea;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 60px 20px;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    p {
      max-width: 600px;
      margin: 20px auto;
      line-height: 1.6;
    }

    .frase {
      font-style: italic;
      opacity: 0.7;
    }

    .btn {
      display: inline-block;
      margin-top: 30px;
      padding: 12px 25px;
      background: #fff;
      color: #000;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ccc;
      transform: scale(1.05);
    }

    .seccion {
      margin-top: 80px;
    }

    hr {
      border: 0;
      height: 1px;
      background: #333;
      margin: 60px auto;
      width: 60%;
    }
  </style>
</head>

<body>

  <!-- Título -->
  <h1>INHABITABLE</h1>
  <p class="frase">No todo lo que existe debería hacerlo.</p>

  <hr>

  <!-- Sección libro -->
  <div class="seccion">
    <h2>El libro</h2>

    <p>
      Hay días que desaparecen.<br>
      Nadie los recuerda.<br>
      No hay pruebas de que hayan ocurrido.
    </p>

    <p>
      Pero tú sí estuviste ahí.
    </p>

    <a class="btn">Próximamente</a>
  </div>

  <hr>

  <!-- Sección extra para generar curiosidad -->
  <div class="seccion">
    <h2>Registro</h2>

    <p class="frase">
      Este proyecto aún no está completo.<br>
      Tampoco debería existir.
    </p>
  </div>

</body>
</html>
